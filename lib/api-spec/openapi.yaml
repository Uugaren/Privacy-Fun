openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: payments
    description: Payment and checkout operations
  - name: auth
    description: Authentication operations
  - name: members
    description: Member area operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /checkout:
    post:
      operationId: createCheckout
      tags: [payments]
      summary: Create a Pix checkout via Nexus Pag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutInput"
      responses:
        "200":
          description: Pix order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: Gateway error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /me/access:
    get:
      operationId: getMyAccess
      tags: [members]
      summary: Get authenticated user access list
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Access list returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /payments/nexus-webhook:
    post:
      operationId: nexusWebhook
      tags: [payments]
      summary: Nexus Pag payment webhook
      parameters:
        - name: token
          in: query
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NexusWebhookPayload"
      responses:
        "200":
          description: Webhook received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookAck"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    CheckoutInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
          description: Password to create the account (min 6 chars)
        amount:
          description: Payment amount in reais (e.g. 21.87)
          oneOf:
            - type: number
            - type: string
      required: [email, password, amount]

    CheckoutResponse:
      type: object
      properties:
        order_id:
          type: string
        status:
          type: string
        pix_copy_paste:
          type: string
        pix_qr_code:
          type: string
        expires_at:
          type: string
        amount:
          type: number
      required: [order_id, status, pix_copy_paste, pix_qr_code]

    LoginInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    AuthSession:
      type: object
      properties:
        token:
          type: string
          description: JWT token
        user:
          $ref: "#/components/schemas/UserProfile"
      required: [token, user]

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        role:
          type: string
      required: [id, email, role]

    AccessResponse:
      type: object
      properties:
        hasAccess:
          type: boolean
        items:
          type: array
          items:
            $ref: "#/components/schemas/AccessItem"
      required: [hasAccess, items]

    AccessItem:
      type: object
      properties:
        id:
          type: integer
        externalOrderId:
          type: string
        grantedAt:
          type: string
      required: [id, externalOrderId, grantedAt]

    NexusWebhookPayload:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
        email:
          type: string
        amount:
          type: number
        created_at:
          type: string
      additionalProperties: true

    WebhookAck:
      type: object
      properties:
        received:
          type: boolean
        processed:
          type: boolean
      required: [received, processed]

    ApiError:
      type: object
      properties:
        error:
          type: string
      required: [error]
