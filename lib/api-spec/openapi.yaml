openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: payments
    description: Payment webhook operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /checkout:
    post:
      operationId: createCheckout
      tags: [payments]
      summary: Create a Pix checkout via Nexus Pag
      description: Initiates a Pix payment order and returns QR code data for the customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutInput"
      responses:
        "200":
          description: Pix order created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookError"
        "502":
          description: Nexus Pag gateway error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookError"

  /payments/nexus-webhook:
    post:
      operationId: nexusWebhook
      tags: [payments]
      summary: Nexus Pag payment webhook
      description: Receives payment status notifications from Nexus Pag
      parameters:
        - name: token
          in: query
          required: false
          schema:
            type: string
          description: Integration token sent by Nexus Pag as query param
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NexusWebhookPayload"
      responses:
        "200":
          description: Webhook received successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookAck"
        "401":
          description: Unauthorized - invalid or missing token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    NexusWebhookPayload:
      type: object
      description: Dynamic payload from Nexus Pag. Fields vary by event type.
      properties:
        id:
          type: string
          description: Nexus Pag order/transaction ID
        status:
          type: string
          description: Payment status (e.g. pago, approved, pending, failed)
        email:
          type: string
          description: Customer email
        amount:
          type: number
          description: Payment amount in cents
        created_at:
          type: string
          description: ISO timestamp from Nexus Pag
      additionalProperties: true

    WebhookAck:
      type: object
      properties:
        received:
          type: boolean
        processed:
          type: boolean
      required:
        - received
        - processed

    CheckoutInput:
      type: object
      properties:
        email:
          type: string
          description: Customer email address
        amount:
          description: Payment amount in reais (e.g. 21.87 = R$21,87)
          oneOf:
            - type: number
            - type: string
      required:
        - email
        - amount

    CheckoutResponse:
      type: object
      properties:
        order_id:
          type: string
          description: Internal order ID (UUID)
        status:
          type: string
          description: Initial order status from Nexus Pag
        pix_copy_paste:
          type: string
          description: Pix copia e cola code
        pix_qr_code:
          type: string
          description: QR Code image in base64
        expires_at:
          type: string
          description: Expiration datetime ISO 8601
        amount:
          type: number
          description: Confirmed amount in reais
      required:
        - order_id
        - status
        - pix_copy_paste
        - pix_qr_code

    WebhookError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
