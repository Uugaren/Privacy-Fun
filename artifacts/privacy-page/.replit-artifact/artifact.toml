kind = "web"
previewPath = "/"
title = "Privacy Creator Page"
version = "1.0.0"
id = "artifacts/privacy-page"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25513

[services.development]
run = "pnpm --filter @workspace/privacy-page run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/privacy-page", "run", "build" ]
publicDir = "artifacts/privacy-page/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25513"
BASE_PATH = "/"
